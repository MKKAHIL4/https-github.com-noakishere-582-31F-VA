<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="style.css">

    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="face-wrapper">
                    <h1 class="mb-2">Happy JSON Loader</h1>
                    <p class="text-muted-mb4">
                        Click an Eye to <strong>LOAD</strong> or <strong>CLEAR</strong> a user.
                        Data comes from a JSON API  and is turned into real Java Script
                        object using<code>response.json()</code>
                    </p>

                    <!--happy face with two eyes buttons -->
                    <div class="happy-face">
                        <!-- Load eye button-->
                        <button id="loadBtn" class="eye-btn eye-left btn btn-primary" type="button">LOAD<br />USER</button>
                        
                        <!-- Clear button eye-->
                        <button id="clearBtn" class="eye-btn eye-right btn btn-outline-secondary" type="button">Clear<br />USER</button>

                        <!--smile-->
                        <div class="smile"></div>
                        
                    </div>

                    <!--status message area-->
                    <div id="statusArea" class="status-area mt-3"></div>
                    
                    <!--user card area-->
                    <div id="userCardArea" class="mt-4"></div>
                </div>
            </div>
        </div> 
    </div>
   <!--boot strap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   <!--my script--> 
    <script src="script.js"></script>
</body>
</html>
